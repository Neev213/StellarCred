name: Bug report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Contracts (Soroban / Rust)
        - Circuits (Noir / ZK proofs)
        - Frontend (Next.js app)
        - SDK (@stellarcred/sdk)
        - Deploy scripts
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Stellar CLI version:
        - nargo version:
        - bb version:
        - Node version:
        - Browser (if frontend):
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
